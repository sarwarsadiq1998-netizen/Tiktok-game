<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تيك توك لايف - تراكب</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:rgba(0,0,0,0.75);font-family:'Segoe UI',sans-serif;direction:rtl;padding:20px;}
        .container{max-width:800px;margin:auto;background:linear-gradient(145deg,#1e1e2a,#0f0f17);border-radius:32px;padding:20px;}
        .streamer-info{display:flex;justify-content:space-between;border-bottom:2px solid #ff0050;padding-bottom:12px;margin-bottom:20px;}
        .likes-counter{background:#ff0050;padding:6px 18px;border-radius:60px;font-weight:bold;}
        .card{background:rgba(30,30,46,0.7);border-radius:24px;padding:15px;margin-bottom:25px;}
        .rank-list{list-style:none;}
        .rank-list li{display:flex;justify-content:space-between;padding:10px;margin:8px 0;border-radius:60px;background:rgba(0,0,0,0.4);border-right:4px solid transparent;}
        .rank-1{background:linear-gradient(95deg,#2a2410,#1f1a08);border-right-color:#FFD700;animation:pulse-gold 1.5s infinite;}
        .rank-2{background:linear-gradient(95deg,#25252e,#1a1a22);border-right-color:#C0C0C0;}
        .rank-3{background:linear-gradient(95deg,#2a2018,#1f160f);border-right-color:#CD7F32;}
        .rank-4{background:rgba(79,195,247,0.15);border-right-color:#4FC3F7;}
        .rank-5{background:rgba(129,199,132,0.15);border-right-color:#81C784;}
        @keyframes pulse-gold{0%{box-shadow:0 0 0 0 rgba(255,215,0,0.4)}70%{box-shadow:0 0 0 8px rgba(255,215,0,0)}}
        .global-table{width:100%;border-collapse:collapse;text-align:center;}
        .global-table th,.global-table td{padding:8px;border-bottom:1px solid rgba(255,255,255,0.1);}
        .global-row-1 td{color:#FFD700;font-weight:bold;}
        .global-row-2 td{color:#C0C0C0;}
        .global-row-3 td{color:#CD7F32;}
        .hidden{display:none;}
        .wave-active{background:#ff8800;animation:blink 0.5s infinite;}
        @keyframes blink{0%{opacity:1}50%{opacity:0.5}}
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div class="container">
    <div class="streamer-info">
        <span>🎬 @<span id="streamerName">...</span></span>
        <span class="likes-counter">❤️ <span id="likesCount">0</span></span>
    </div>
    <div class="card"><h3>🏆 أعلى 5 مشاهدين لايكاً</h3><ul class="rank-list" id="top5List"><li>...</li></ul></div>
    <div class="card" id="otherStreamersCard"><h3>🔥 أفضل البثوث الأخرى</h3><ul class="rank-list" id="otherStreamersList"><li>...</li></ul></div>
    <div class="card" id="globalCard"><h3>🌍 التوب العالمي (أسبوعي)</h3><table class="global-table"><thead><tr><th>#</th><th>الستريمر</th><th>اللايكات</th></tr></thead><tbody id="globalLeaderboardBody"></tbody></table></div>
    <div id="waveAlert"></div>
</div>
<script>
    const socket = io();
    function renderRank(list, elementId, isViewer=true) {
        const container = document.getElementById(elementId);
        if(!list||!list.length){container.innerHTML='<li>لا توجد بيانات</li>';return;}
        const classes=['rank-1','rank-2','rank-3','rank-4','rank-5'];
        let html='';
        list.forEach((item,i)=>{
            let name=isViewer?item.id:item.username;
            let count=isViewer?item.count:item.weekly_likes;
            html+=`<li class="${classes[i]}"><span>${i+1}</span><span>${name}</span><span>❤️ ${count.toLocaleString()}</span></li>`;
        });
        container.innerHTML=html;
    }
    function renderGlobal(leaderboard){
        const tbody=document.getElementById('globalLeaderboardBody');
        if(!leaderboard||!leaderboard.length){tbody.innerHTML='<td><td colspan="3">لا توجد بيانات</td></tr>';return;}
        let rows='';
        leaderboard.forEach((row,i)=>{
            let rowClass=(i===0?'global-row-1':(i===1?'global-row-2':(i===2?'global-row-3':'')));
            rows+=`<tr class="${rowClass}"><tr>${i+1}</td><td>@${row.username}</td><td>${row.weekly_likes.toLocaleString()}</td></tr>`;
        });
        tbody.innerHTML=rows;
    }
    socket.on('live-update',(data)=>{
        document.getElementById('likesCount').innerText=(data.totalLikes||0).toLocaleString();
        if(data.top5) renderRank(data.top5,'top5List',true);
        if(data.otherStreamers) renderRank(data.otherStreamers.map(s=>({username:s.username,weekly_likes:s.weekly_likes})),'otherStreamersList',false);
        if(data.waveActive){
            document.getElementById('waveAlert').innerHTML='<div class="wave-active">🔥 موجة ساخنة x'+data.waveMultiplier+' ! 🔥</div>';
        }else document.getElementById('waveAlert').innerHTML='';
    });
    socket.on('update-global-leaderboard',renderGlobal);
    socket.on('leaderboard-visibility',(show)=>{
        document.getElementById('globalCard').classList.toggle('hidden',!show);
    });
    socket.on('wave-started',(w)=>{console.log('Wave started',w);});
    socket.on('contest-started',(c)=>{alert(`مسابقة بدأت! الكود: ${c.code} أرسله في الدقيقة القادمة`);});
    fetch('/api/streamer-name').then(r=>r.json()).then(d=>document.getElementById('streamerName').innerText=d.username);
</script>
</body>
</html>
